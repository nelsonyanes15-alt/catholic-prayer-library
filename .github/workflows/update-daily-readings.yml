name: Update Daily Mass Readings Feed

on:
  schedule:
    # USCCB's liturgical day rolls over at US Eastern midnight. Run a few times
    # in the early-Eastern window so the new day's readings are committed before
    # anyone is likely to open the app. Times are UTC.
    #   04:30 UTC = 00:30 ET   (just after the day rolls over)
    #   06:30 UTC = 02:30 ET   (retry if USCCB lagged or blocked the first run)
    #   12:30 UTC = 08:30 ET   (final safety net for the morning)
    - cron: '30 4 * * *'
    - cron: '30 6 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-mass-readings
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install parser dependency
        shell: bash
        run: pip install --quiet beautifulsoup4

      - name: Build daily-readings.xml from the USCCB readings page
        shell: bash
        run: |
          # No `set -e`: a USCCB hiccup must never fail the job and leave a stale
          # feed committed forever. The Python script always writes a valid RSS
          # file (real readings when reachable, a graceful fallback otherwise).
          set -uo pipefail
          python3 scripts/build_readings.py

      - name: Commit feed only when it changed
        shell: bash
        run: |
          set -uo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add daily-readings.xml
          if git diff --cached --quiet; then
            echo 'Feed has not changed.'
          else
            git commit -m 'Update Daily Mass readings feed'
            git push
          fi
